name: Security Scan

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Every push to 'develop' or 'main'
#   • Every Pull Request targeting 'main'  ← this is what blocks the merge
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: OWASP Dependency-Check
  # Scans all Maven dependencies for known CVEs (NVD database).
  # Fails if any dependency has a CVSS score >= 7 (HIGH or CRITICAL).
  # ───────────────────────────────────────────────────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build project (skip tests to keep scan fast)
      - name: Build project (skip tests)
        run: mvn clean package -DskipTests --no-transfer-progress

      # Run OWASP Dependency-Check via Maven plugin
      # failBuildOnCVSS=7 means HIGH (7-8.9) and CRITICAL (9-10) block the build
      - name: Run OWASP Dependency-Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=ALL \
            -DsuppressionFiles=owasp-suppressions.xml \
            --no-transfer-progress
        env:
          # Optional: Set NVD API key to avoid rate-limiting on NVD data download
          # Create a secret in GitHub: Settings → Secrets → NVD_API_KEY
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # Upload the HTML and XML reports as downloadable artifacts
      - name: Upload OWASP report
        if: always()  # Upload even if the scan fails, so you can review the report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.xml
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: SpotBugs + Find Security Bugs (SAST)
  # Performs static analysis on Java source code.
  # Detects: SQL injection, XSS, insecure deserialization, path traversal, etc.
  # Fails if any SECURITY-category bug is found at any priority level.
  # ───────────────────────────────────────────────────────────────────────────
  spotbugs-security-scan:
    name: SpotBugs Security Scan (SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build project (skip tests to keep scan fast)
      - name: Build project (skip tests)
        run: mvn clean package -DskipTests --no-transfer-progress

      # Run SpotBugs with Find Security Bugs plugin
      # The spotbugs:check goal fails the build if bugs are found above the threshold
      - name: Run SpotBugs Security Analysis
        run: |
          mvn spotbugs:check \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=Low \
            -Dspotbugs.failOnError=true \
            --no-transfer-progress

      # Upload SpotBugs XML report for review
      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-security-report
          path: target/spotbugsXml.xml
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: Security Scan Gate
  # Summary job that both scan jobs must pass.
  # Add THIS job to GitHub Branch Protection required checks
  # so that the merge button is only enabled when both scans pass.
  # ───────────────────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate (All Scans Must Pass)
    runs-on: ubuntu-latest
    needs:
      - owasp-dependency-check
      - spotbugs-security-scan

    steps:
      - name: All security scans passed
        run: |
          echo "✅ OWASP Dependency-Check: PASSED"
          echo "✅ SpotBugs Security Scan: PASSED"
          echo "✅ No HIGH or CRITICAL vulnerabilities found."
          echo "✅ PR is safe to merge."
