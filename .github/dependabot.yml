# ─────────────────────────────────────────────────────────────────────────────
# Dependabot Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Dependabot does TWO things:
#   1. Security Updates  → auto-opens PRs when a dependency has a known CVE
#   2. Version Updates   → auto-opens PRs to keep dependencies up to date
#
# NOTE: Dependabot only supports ONE target-branch per entry.
#       To cover both 'main' and 'develop', each ecosystem is declared twice.
#
# To BLOCK merges when HIGH/CRITICAL alerts exist:
#   Go to: GitHub repo → Settings → Code security → Dependabot alerts
#   Enable: "Dependabot security updates"
#   Then in Branch Protection for 'main':
#   Add required check: "Dependabot: <ecosystem>"
# ─────────────────────────────────────────────────────────────────────────────

version: 2

updates:

  # ═══════════════════════════════════════════════════════════════════════════
  # MAVEN — targeting 'develop' branch
  # Dependabot PRs for CVE fixes go to develop first (safe review gate).
  # ═══════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"
    target-branch: "develop"
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "dependencies"
      - "dependabot"
      - "develop"
    groups:
      spring-boot-updates-develop:
        patterns:
          - "org.springframework.boot*"
        update-types:
          - "minor"
          - "patch"
      patch-updates-develop:
        patterns:
          - "*"
        update-types:
          - "patch"
    allow:
      - dependency-type: "all"

  # ═══════════════════════════════════════════════════════════════════════════
  # MAVEN — targeting 'main' branch
  # Dependabot PRs for critical security patches go directly to main.
  # ═══════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:30"                     # Offset by 30 min to avoid conflicts
      timezone: "Asia/Kolkata"
    target-branch: "main"
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "dependencies"
      - "dependabot"
      - "main"
    groups:
      spring-boot-updates-main:
        patterns:
          - "org.springframework.boot*"
        update-types:
          - "minor"
          - "patch"
      patch-updates-main:
        patterns:
          - "*"
        update-types:
          - "patch"
    allow:
      - dependency-type: "all"

  # ═══════════════════════════════════════════════════════════════════════════
  # GITHUB ACTIONS — targeting 'develop' branch
  # Keeps workflow action versions up to date (e.g., actions/checkout@v4).
  # Outdated Actions can themselves have security vulnerabilities.
  # ═══════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    target-branch: "develop"
    labels:
      - "dependencies"
      - "github-actions"
      - "develop"
    open-pull-requests-limit: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # GITHUB ACTIONS — targeting 'main' branch
  # ═══════════════════════════════════════════════════════════════════════════
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Asia/Kolkata"
    target-branch: "main"
    labels:
      - "dependencies"
      - "github-actions"
      - "main"
    open-pull-requests-limit: 5
